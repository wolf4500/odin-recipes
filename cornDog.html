<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Corn Dog</title>
  </head>
  <body>
    <h1>Corn Dog</h1>
    <img src="pics/Corn Dog.jpeg" alt="Picture of Corn Dog" />
    <h2>The best recipe</h2>
    <h3>Ingredients</h3>
    <ul>
      <li>Store-bought corn dog</li>
    </ul>
    <h3>Instructions</h3>
    <ol>
      <li>Rip the plastic wrap of the corndog package open</li>
      <li>Place corn dog in the microwave</li>
      <li>Microwave the corn dog for 30 seconds</li>
      <li>Place onto a cookout plate and enjoy</li>
    </ol>
  </body>
</html>
